name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          output="home-agent-bootstrap-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags="-s -w" -o "dist/${output}" .
          (cd dist && shasum -a 256 "${output}" > "${output}.sha256")

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
