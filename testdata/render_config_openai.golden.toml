language = "zh"
data_dir = "/Users/me/.cc-connect"
attachment_send = "on"

[log]
level = "info"

[display]
mode = "compact"
thinking_messages = false
tool_messages = false
thinking_max_len = 300
tool_max_len = 500

[management]
enabled = true
port = 9820
token = "mgmt-token"
cors_origins = ["http://localhost:9820", "http://127.0.0.1:9820"]

[bridge]
enabled = true
port = 9810
token = "bridge-token"
path = "/bridge/ws"

[webhook]
enabled = true
port = 9111
token = "hook-token"
path = "/hook"

[[hooks]]
event = "*"
type = "command"
command = "mkdir -p /Users/me/.cc-connect/audit && echo \"$(date '+%Y-%m-%dT%H:%M:%S%z') $CC_HOOK_EVENT $CC_HOOK_USER_ID $CC_HOOK_USER_NAME\" >> /Users/me/.cc-connect/audit/events.log"
async = true
timeout = 5

[[projects]]
name = "home"
reset_on_idle_mins = 0
admin_from = ""

[projects.users]
default_role = "member"

[projects.users.roles.member]
user_ids = ["*"]
disabled_commands = ["shell", "show", "dir", "restart", "upgrade", "commands"]
rate_limit = { max_messages = 10, window_secs = 60 }

[projects.agent]
type = "claudecode"

[projects.agent.options]
work_dir = "/Users/me/home-assistant-workspace"
mode = "auto"
provider = "openai"

[[projects.agent.providers]]
name = "openai"
api_key = "sk-openai"
base_url = "https://api.openai.com/v1"
model = "gpt-4.1"

# Heartbeat 需要知道目标会话 session_key。
# 启动并完成首次微信对话后，可通过 /status 或日志确认 session_key，再取消注释。
#
# [projects.heartbeat]
# enabled = true
# interval_mins = 60
# session_key = "weixin:REPLACE_WITH_SESSION_KEY"
# only_when_idle = true
# silent = true
# timeout_mins = 10
# prompt = "读取 HEARTBEAT.md，检查今天家庭提醒、待办、异常事项，只在需要时提醒。"


[[projects.platforms]]
type = "weixin"

[projects.platforms.options]
token = ""
base_url = "https://ilinkai.weixin.qq.com"
cdn_base_url = "https://novac2c.cdn.weixin.qq.com/c2c"
allow_from = ""
account_id = "wx-main"
long_poll_timeout_ms = 35000
